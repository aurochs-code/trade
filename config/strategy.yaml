# ═══════════════════════════════════════════════════════════════
# 量化策略 V1.0 — 趋势过滤 + 风格双轨
# ═══════════════════════════════════════════════════════════════

# ---------------------------------------------------------------------------
# 第一步：粗筛与排雷（每日盘后）
# ---------------------------------------------------------------------------
screening:
  mx_query: "站上20日均线，股价5元到200元，上市天数大于60天，非ST，今日未涨停，近20日平均成交额大于5000万元，市值大于50亿元"
  mx_select_type: "A股"
  market_scan_limit: 300       # 手工 screener run 的粗筛广度
  refresh_scan_limit: 10       # 调度 refresh 的逐票深度评分预算；需要全量时显式传 --limit
  screener_query_timeout_seconds: 30 # 粗筛源搜索超时，超时返回 JSON 失败而不是卡住调度
  screener_scoring_timeout_seconds: 90 # 逐票评分/采集总超时，超时不刷新候选池
  snapshot_timeout_seconds: 20 # 单票深度采集总超时，避免慢 provider 拖住调度刷新
  sector_context_timeout_seconds: 15 # 行业/概念上下文总超时；超时只降级 L2 证据
  include_hot_recall: true
  hot_recall_limit: 20
  include_recent_signal_recall: true
  recent_signal_recall_limit: 20
  recent_signal_recall_event_limit: 500
  candidate_cache_ttl_hours: 24
  fallback_filters:
    min_price: 5
    max_price: 200
    min_amount: 50000000       # 5000万（原1亿，放宽）
    min_market_cap: 5000000000 # 50亿
    min_listed_days: 60
    exclude_limit_up: true
    exclude_st: true
    above_ma20: true

# ---------------------------------------------------------------------------
# 第二步：入场触发信号
# ---------------------------------------------------------------------------
entry_signal:
  # 入场模式：hybrid（MA金叉+趋势+回踩任一），strict（仅金叉），score_only（仅评分）
  entry_mode: hybrid
  # 基础触发（三条件同时满足）
  ma_cross:
    fast: 10                   # MA10
    slow: 20                   # MA20
    type: golden_cross         # 金叉
  volume_ratio_min: 1.2        # 趋势金叉入场线；后续仍由评分、数据质量和风控闸门过滤
  rsi_max: 70                  # RSI < 70（防接盘）
  pullback_volume_ratio_max: 1.6  # 均线回踩转强路线的量比上限
  pullback_rsi_max: 68         # 均线回踩转强路线的 RSI 上限
  rsi_period: 14               # RSI 周期
  # C版新增过滤条件
  deviation_max: 10.0          # 乖离率 < 10%（C版）
  require_bullish_candle: true # 金叉当日必须收阳线（C版）

  # 慢牛补充信号：回踩 MA20 不破 + 次日放量阳线
  pullback:
    enabled: true
    ma_support: 20             # 回踩 MA20
    volume_confirm: true       # 次日放量确认
    require_bullish_candle: true  # 次日阳线

# ---------------------------------------------------------------------------
# 短续接力策略
# ---------------------------------------------------------------------------
continuation:
  filters:
    amount_min: 200000000
    change_pct_min: 2.0
    close_near_high_min: 0.75
    max_intraday_retrace: 0.04
    volume_ratio_min: 1.2
    volume_ratio_max: 3.5
    require_above_ma5: true
    exclude_long_upper_shadow: true
    exclude_limit_up_locked: true
  scoring:
    strength_weight: 1.0
    continuity_weight: 1.0
    quality_weight: 1.0
    flow_weight: 0.5
    stability_weight: 0.7
    top_n: 3
    hold_days: [1, 2, 3]
    strength_change_floor: 2.0
    strength_change_full: 7.0
    strength_close_near_high_floor: 0.75
    strength_close_near_high_full: 0.95
    continuity_momentum_floor: 2.0
    continuity_momentum_full: 8.0
    quality_retrace_good: 0.015
    quality_retrace_bad: 0.06
    quality_body_ratio_floor: 0.3
    quality_body_ratio_full: 0.7
    flow_inflow_full: 500000000
    stability_rsi_ceiling: 72.0
    stability_rsi_fail: 82.0
    overheat_change_pct: 8.0
    overheat_volume_ratio: 4.0
    overheat_deviation_rate: 8.0
    overheat_rsi: 78.0
  validation:
    bucket_count: 5
    execution_modes: ["open", "vwap_30m", "open_not_chase"]

# ---------------------------------------------------------------------------
# 第三步：股票风格判定
# ---------------------------------------------------------------------------
style_classifier:
  # 慢牛成长股特征
  slow_bull:
    daily_volatility_max: 0.02       # 日常波动 < 2%
    rsi_range: [50, 65]              # RSI 常年 50-65
    ma20_slope_min: 0.005            # MA20 斜率连续 10日 > 0.5%
    ma20_slope_lookback_days: 10     # 斜率观察窗口
  # 题材趋势股特征
  momentum:
    daily_volatility_min: 0.03       # 日常波动 > 3%
    rsi_high_threshold: 75           # RSI 容易冲高至 75+
    ma20_slope_min: 0.02             # MA20 斜率陡峭 > 2%

# ---------------------------------------------------------------------------
# 第四步：风控参数（双轨）
# ---------------------------------------------------------------------------
risk:
  # 慢牛成长股
  slow_bull:
    stop_loss: 0.08                  # -8% 止损
    absolute_stop_ma: 60             # 或跌破 MA60
    take_profit: none                # 不主动止盈（让利润奔跑）
    exit_ma: 20                      # 收盘价跌破 MA20 离场
    time_stop_days: 30               # 30 个交易日不涨才审视

  # 题材趋势股
  momentum:
    stop_loss: 0.08                  # -8% 止损（C版）
    stop_loss_anchor: entry_day_low  # 或跌破买入日最低价
    trailing_stop: 0.18              # 移动止盈：最高点回撤 -18%（进攻候选）
    trailing_ma_cross:               # 或 MA5 死叉 MA10
      fast: 5
      slow: 10
    exit_ma: 20                      # 收盘价跌破 MA20 离场
    time_stop_days: 30               # 30 个交易日不创新高即警惕（进攻候选）

  # 通用风控（不分风格）
  portfolio:
    daily_loss_limit_pct: 0.03
    consecutive_loss_days_limit: 2
    cooldown_days: 2
    max_single_position_warn_pct: 0.25
    max_sector_exposure_warn_pct: 0.40
    max_correlation_group_exposure_warn_pct: 0.50
  intraday_monitor:
    daily_loss_alert_pct: 0.05      # 盘中单票当日跌幅 >= 5% 立即告警
  position:
    total_max: 0.67
    single_max: 0.22
    trial_single_max_ratio: 0.50
    target_vol_pct: 0.02
    weekly_max: 5
    holding_max: 5
  false_breakout_cooldown:
    enabled: true
    lookback_days: 30
    failure_threshold: 2
    cooldown_days: 10

# ---------------------------------------------------------------------------
# 第五步：动态风格切换（防回撤保险丝）
# ---------------------------------------------------------------------------
style_switch:
  # 慢牛 → 题材模式的强制切换条件（任一触发）
  triggers:
    single_day_surge_pct: 0.07       # 单日涨幅 > 7%
    rsi_overheat_threshold: 75       # RSI > 75
    rsi_overheat_consecutive_days: 3 # 连续 3 日
  # 切换后执行题材股的止盈规则
  action: switch_to_momentum

# ---------------------------------------------------------------------------
# 评分权重（满分10，保留四维评分体系）
# ---------------------------------------------------------------------------
scoring:
  weights:
    technical: 4.0    # 技术信号为主（金叉/量比/RSI/趋势确认）
    fundamental: 2.5  # 基本面保留过滤后的质量分
    flow: 3.0         # 资金面提高为主要确认项
    sentiment: 0.5    # 舆情仅作置信修正，避免放大噪声

  thresholds:
    buy: 6.0
    watch: 5
    reject: 4

  decision_gates:
    require_entry_signal_for_buy: true
    min_data_quality_for_buy: ok
    max_missing_fields_for_buy: 0
    critical_missing_fields_for_buy: []
    min_position_pct_for_buy: 0.01
    trial_buy_threshold: 6.0
    trial_buy_entry_signal_threshold: 5.5

  market_regime_overlays:
    GREEN:
      buy_threshold: 6.5
      allow_trial_buy: true
    YELLOW:
      buy_threshold: 6.5
      allow_trial_buy: false
      disabled_trial_routes: [shrink_pullback]
    RED:
      buy_threshold: 7.0
      allow_trial_buy: true
      enabled_trial_routes: [pullback_to_ma20]
    CLEAR:
      buy_threshold: 7.0
      allow_trial_buy: false
      disabled_trial_routes: [shrink_pullback]

  score_adjustments:
    tech_flow_correlation:
      enabled: true
      tech_threshold: 2.5
      flow_threshold: 1.5
      flow_discount: 0.7

  route_execution_policy: &route_execution_policy_v3
    GREEN:dragon_head:
      score_min: 6.0
      position_pct: 0.22
      priority: 85
    GREEN:volume_breakout:
      score_min: 6.0
      position_pct: 0.22
      priority: 80
    GREEN:short_continuation:
      score_min: 6.0
      position_pct: 0.22
      priority: 70
    GREEN:ma_golden_cross:
      score_min: 6.0
      position_pct: 0.22
      priority: 60
    YELLOW:shrink_pullback:
      score_min: 6.0
      position_pct: 0.11
      priority: 35
    YELLOW:relative_strength_overheat:
      score_min: 6.0
      position_pct: 0.11
      priority: 30
    YELLOW:pullback_to_ma20:
      score_min: 6.0
      position_pct: 0.11
      priority: 65
    YELLOW:volume_breakout:
      score_min: 6.0
      position_pct: 0.11
      priority: 80
    RED:volume_breakout:
      score_min: 6.0
      position_pct: 0.066
      priority: 75
    RED:pullback_to_ma20:
      score_min: 6.0
      position_pct: 0.066
      priority: 65

  veto:
    - below_ma20
    - limit_up_today
    - consecutive_outflow
    - red_market
    - earnings_bomb
    - ma20_trend_down          # 新增：MA20 趋势向下一票否决

# ---------------------------------------------------------------------------
# 大盘择时
# ---------------------------------------------------------------------------
market_timer:
  green_days: 3
  red_days: 5
  clear_days_ma60: 15

# ---------------------------------------------------------------------------
# 池子管理
# ---------------------------------------------------------------------------
pool_management:
  watch_min_score: 5
  radar_min_score: 4.5      # 强势观察线：只跟踪、不触发买入
  promote_min_score: 6.0   # 与 thresholds.buy 保持一致
  promote_streak_days: 2
  entry_signal_promote_streak_days: 1 # 已有可执行入场路线的高分票，可先进入核心候选供模拟承接
  demote_max_score: 5
  demote_streak_days: 2
  remove_max_score: 4
  remove_streak_days: 2
  veto_immediate_demote: true
  add_to_watch_streak_days: 1

# ---------------------------------------------------------------------------
# 人工确认有效期
# ---------------------------------------------------------------------------
manual_confirmation:
  # 买入意向超过有效期，或错过 auto_trade.buy_window 后，只作为待复核项；
  # 不再压住后续观察候选和影子试运行提示。
  pending_max_age_hours: 4

# ---------------------------------------------------------------------------
# 资金
# ---------------------------------------------------------------------------
capital: 500022

