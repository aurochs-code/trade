# ---------------------------------------------------------------------------
# 模拟盘自动交易
# ---------------------------------------------------------------------------
auto_trade:
  enabled: true                # 自动交易流程开启；仅连接 MX 模拟盘，不连接实盘券商
  dry_run: false               # 提交 MX 模拟盘委托；仍不涉及实盘券商接口
  max_daily_trades: 4          # 单日最大交易次数（买+卖）
  sell_urgency: immediate      # 自动卖出的风控级别（immediate / end_of_day / advisory）
  # 买入时间窗口（避免尾盘波动）
  buy_window:
    start: "09:45"
    end: "14:30"
  # 卖出时间窗口
  sell_window:
    start: "09:35"
    end: "14:50"

# ---------------------------------------------------------------------------
# 舆情监控
# ---------------------------------------------------------------------------
sentiment:
  scan_interval_minutes: 30
  dedup_hours: 24
  candidate_pool_limit: 30  # 持仓之外，最多扫描多少只核心/观察/强势观察候选
  enabled: true
