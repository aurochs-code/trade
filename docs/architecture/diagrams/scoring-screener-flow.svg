<svg xmlns="http://www.w3.org/2000/svg" width="1540" height="820" viewBox="0 0 1540 820" role="img" aria-labelledby="title desc">
  <title id="title">Scoring and screener flow</title>
  <desc id="desc">Screener and scoring flow from query or candidate pool through market snapshots, scoring, decision events, candidate pool updates, Obsidian and Discord.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10z" fill="#334155"/></marker>
    <style>
      .bg{fill:#fbfdff}.in{fill:#eff6ff;stroke:#60a5fa;stroke-width:2}.svc{fill:#fff7ed;stroke:#fb923c;stroke-width:2}.db{fill:#f5f3ff;stroke:#a78bfa;stroke-width:2}.out{fill:#ecfdf5;stroke:#34d399;stroke-width:2}.h{font:700 26px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}.t{font:700 17px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}.s{font:400 13px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#475569}.m{font:600 13px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#334155}.line{fill:none;stroke:#334155;stroke-width:2.2;marker-end:url(#arrow)}.dash{fill:none;stroke:#64748b;stroke-width:2;stroke-dasharray:7 6;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1540" height="820"/>
  <text class="h" x="52" y="56">核心流程 2：选股筛选与四维评分</text>
  <text class="s" x="54" y="84">同一评分链路被 `screener run`、`screener score`、MCP `trade_score_batch`、`scoring` pipeline 复用。</text>

  <rect class="in" x="60" y="140" rx="12" width="250" height="138"/>
  <text class="t" x="92" y="176">输入 A：自然语言选股</text>
  <text class="m" x="94" y="208">screener run --query</text>
  <text class="s" x="94" y="234">MXScreenerAdapter.search_stocks()</text>
  <text class="s" x="94" y="258">限制评分数量：limit / config</text>

  <rect class="in" x="60" y="340" rx="12" width="250" height="138"/>
  <text class="t" x="92" y="376">输入 B：候选池</text>
  <text class="m" x="94" y="408">projection_candidate_pool</text>
  <text class="s" x="94" y="434">core / watch 股票列表</text>
  <text class="s" x="94" y="458">按 score 排序读取</text>

  <rect class="svc" x="388" y="218" rx="14" width="260" height="180"/>
  <text class="t" x="420" y="254">MarketService.collect_batch</text>
  <text class="s" x="422" y="286">每只股票并发 collect_snapshot</text>
  <text class="s" x="422" y="312">quote / financial / flow / sentiment</text>
  <text class="s" x="422" y="338">K 线计算 TechnicalIndicators</text>
  <text class="m" x="422" y="366">market_observations</text>

  <rect class="svc" x="716" y="218" rx="14" width="260" height="180"/>
  <text class="t" x="748" y="254">大盘状态</text>
  <text class="s" x="750" y="286">collect_market_state()</text>
  <text class="s" x="750" y="312">compute_market_signal()</text>
  <text class="s" x="750" y="338">GREEN / YELLOW / RED / CLEAR</text>
  <text class="m" x="750" y="366">projection_market_state</text>

  <rect class="svc" x="1044" y="168" rx="14" width="320" height="260"/>
  <text class="t" x="1076" y="204">StrategyService.evaluate</text>
  <text class="s" x="1078" y="236">Scorer.score_batch()</text>
  <text class="s" x="1078" y="262">技术、基本面、资金、舆情四维</text>
  <text class="s" x="1078" y="288">veto_rules / entry_signal</text>
  <text class="s" x="1078" y="322">Decider.decide()</text>
  <text class="s" x="1078" y="348">结合大盘信号、当前仓位、本周买入次数</text>
  <text class="m" x="1078" y="386">score.calculated + decision.suggested</text>

  <rect class="db" x="390" y="550" rx="14" width="290" height="154"/>
  <text class="t" x="422" y="586">事件事实</text>
  <text class="m" x="424" y="618">event_log</text>
  <text class="s" x="424" y="646">metadata: run_id, config_version</text>
  <text class="s" x="424" y="672">BUY 决策额外写 manual_trade.requested</text>

  <rect class="db" x="760" y="550" rx="14" width="280" height="154"/>
  <text class="t" x="792" y="586">候选池更新</text>
  <text class="s" x="794" y="618">高分加入 watch</text>
  <text class="s" x="794" y="644">核心池低分降级/移除</text>
  <text class="m" x="794" y="674">projection_candidate_pool</text>

  <rect class="out" x="1118" y="550" rx="14" width="290" height="154"/>
  <text class="t" x="1150" y="586">输出</text>
  <text class="s" x="1152" y="618">Obsidian 评分报告、池子文件</text>
  <text class="s" x="1152" y="644">池子调整建议</text>
  <text class="s" x="1152" y="670">Discord scoring embed</text>

  <path class="line" d="M310 210 C344 210 354 270 388 286"/>
  <path class="line" d="M310 410 C344 410 354 350 388 332"/>
  <path class="line" d="M648 308 H716"/>
  <path class="line" d="M976 308 H1044"/>
  <path class="line" d="M648 308 C785 174 918 178 1044 238"/>
  <path class="line" d="M1204 428 C1204 496 640 492 535 550"/>
  <path class="line" d="M1204 428 C1204 520 950 498 900 550"/>
  <path class="line" d="M1040 628 H1118"/>
  <path class="dash" d="M535 550 C620 492 780 470 900 550"/>
</svg>
